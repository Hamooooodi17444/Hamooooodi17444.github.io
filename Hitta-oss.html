<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Boka Bord | Chef Tingeling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="pt-5">
    <header id="header-nav"></header>

    <main class="container py-5 mt-5">
        <div class="row">
            <div class="col-md-6 mb-5">
                <h2 class="text-gold mb-4">Boka ditt bord</h2>
                <form class="p-4 rounded" style="background: #1a1a1a; border: 1px solid #333;">
                    <div class="mb-3">
                        <label class="form-label">Ditt Namn</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Antal personer</label>
                            <input type="number" class="form-control bg-dark text-white border-secondary" value="2">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Telefonnummer</label>
                            <input type="tel" class="form-control bg-dark text-white border-secondary">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Datum</label>
                            <input type="date" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tid</label>
                            <input type="time" class="form-control bg-dark text-white border-secondary">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 mt-3">Skicka Bokningsförfrågan</button>
                </form>
            </div>
            <div class="col-md-6 px-md-5">
                <h2 class="text-gold mb-4">Hitta till oss</h2>
                <p class="fs-5">Storgatan 12, 111 22 Stockholm</p>
                <div class="ratio ratio-16x9 shadow border border-secondary">
                    <iframe src="http://googleusercontent.com/maps.google.com/6" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="init.js"></script>
</body>
</html>
