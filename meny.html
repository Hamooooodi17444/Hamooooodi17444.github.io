<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Meny | Chef Tingeling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bilder.css">
</head>
<body class="pt-5">
    <header id="header-nav"></header>

    <main class="container py-5 mt-5">
        <h1 class="text-center display-4 mb-5">La Carte</h1>
        <div class="row align-items-center">
            <div class="col-lg-6 mb-5 mb-lg-0">
                <img src="mat.jpg" alt="Vår konst" class="menu-img">
            </div>
            <div class="col-lg-6 px-lg-5">
                <div class="menu-item">
                    <h5 class="text-gold">Sotad pilgrimsmussla</h5>
                    <div class="d-flex justify-content-between">
                        <span>Med blomkålspuré och brynt smör</span>
                        <span class="fw-bold">195 kr</span>
                    </div>
                </div>
                <div class="menu-item">
                    <h5 class="text-gold">Chef Tingelings Lammracks</h5>
                    <div class="d-flex justify-content-between">
                        <span>Med rödvinssky och primörer</span>
                        <span class="fw-bold">385 kr</span>
                    </div>
                </div>
                <div class="menu-item">
                    <h5 class="text-gold">Chokladfondant</h5>
                    <div class="d-flex justify-content-between">
                        <span>Havssalt och hemgjord vaniljglass</span>
                        <span class="fw-bold">145 kr</span>
                    </div>
                </div>
                <p class="mt-4 font-italic text-muted">"Priset signalerar kvalitet. Vi döljer inget." - Mr. Strid</p>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="init.js"></script>
</body>
</html>
